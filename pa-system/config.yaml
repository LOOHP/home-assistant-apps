name: PA System
version: "1.0.5"
slug: pa_system
panel_icon: mdi:bullhorn
panel_title: PA System
panel_admin: false
ingress: true
ingress_stream: true
description: "Live Mic PA System using HA Media Players"
url: "https://github.com/LOOHP/home-assistant-apps"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
startup: services
boot: auto
init: false
host_network: true
map:
  - type: homeassistant_config
    read_only: false
options:
  home_assistant_ip: "192.168.1.3"
  app_port: 8099
  ha_token: ""
  log_level: "info"
  targets_json: |
    [
      {
        "id": "living_room",
        "name": "Living Room",
        "entity_id": "media_player.audio_living_room",
        "kind": "speaker"
      },
      {
        "id": "audio_bedroom_s",
        "name": "Audio Bedroom (S)",
        "entity_id": "media_player.audio_bedroom_s",
        "kind": "speaker"
      },
      {
        "id": "audio_bedroom_l",
        "name": "Audio Bedroom (L)",
        "entity_id": "media_player.audio_bedroom_l",
        "kind": "speaker"
      }
    ]
schema:
  home_assistant_ip: str
  app_port: port
  ha_token: password
  log_level: list(trace|debug|info|warning|error|critical)
  targets_json: str
